<script>
  // ===== PAYWALL LOGIC =====
  const MAX_FREE = 3;
  const OWNER_CODE = 'Coco2026';
  const MAX_FREE_CHATS = 3;
  const FREE_GUIDES = 3;

  function getAnalysisCount() {
    try {
      return parseInt(localStorage.getItem('pawread_count') || '0', 10);
    } catch (e) {
      return 0;
    }
  }

  function isOwner() {
    try {
      return localStorage.getItem('pawread_owner') === 'true';
    } catch (e) {
      return false;
    }
  }

  function isPremium() {
    try {
      return (
        localStorage.getItem('pawread_owner') === 'true' ||
        localStorage.getItem('pawread_premium') === 'true'
      );
    } catch (e) {
      return false;
    }
  }

  function incrementAnalysisCount() {
    try {
      const count = getAnalysisCount() + 1;
      localStorage.setItem('pawread_count', String(count));
      return count;
    } catch (e) {
      return 1;
    }
  }

  function checkPaywall() {
    if (isOwner() || isPremium()) return false;

    const count = getAnalysisCount();
    if (count >= MAX_FREE) {
      document.getElementById('paywall-overlay').classList.add('active');
      return true;
    }
    return false;
  }

  function checkOwnerCode(code) {
    if (code === OWNER_CODE) {
      try {
        localStorage.setItem('pawread_owner', 'true');
      } catch (e) {}
      return true;
    }
    return false;
  }

  function closePaywall() {
    document.getElementById('paywall-overlay').classList.remove('active');
  }

  function showGuidePaywall() {
    document.getElementById('paywall-overlay').classList.add('active');
  }

  function tryOwnerCode() {
    const input = document.getElementById('owner-code-input');
    if (checkOwnerCode(input.value)) {
      closePaywall();
      try {
        localStorage.setItem('pawread_count', '0');
      } catch (e) {}
      alert('🐾 Willkommen Carolin! Unbegrenzte Analysen freigeschaltet!');
    } else {
      input.style.borderColor = '#F44336';
      input.value = '';
      input.placeholder = 'Falscher Code...';
    }
  }

  function submitPaywall() {
    const emailInput = document.getElementById('paywall-email');
    const email = emailInput.value.trim();

    if (!email || !email.includes('@')) {
      emailInput.style.borderColor = '#F44336';
      emailInput.placeholder = 'Bitte gültige E-Mail eingeben';
      return;
    }

    try {
      const emails = JSON.parse(localStorage.getItem('pawread_emails') || '[]');
      emails.push({ email, date: new Date().toISOString() });
      localStorage.setItem('pawread_emails', JSON.stringify(emails));
    } catch (e) {}

    document.getElementById('paywall-form-view').style.display = 'none';
    document.getElementById('paywall-success').style.display = 'block';

    try {
      localStorage.setItem('pawread_count', '0');
      localStorage.setItem('pawread_premium', 'true');
    } catch (e) {}
  }

  // ===== CHATBOT LOGIC =====
  let chatOpen = false;

  function getTodayChatCount() {
    try {
      const d = new Date().toDateString();
      const stored = JSON.parse(localStorage.getItem('pawread_chat_data') || '{"date":"","count":0}');
      return stored.date === d ? stored.count : 0;
    } catch (e) {
      return 0;
    }
  }

  function incrementChatCount() {
    try {
      const d = new Date().toDateString();
      const stored = JSON.parse(localStorage.getItem('pawread_chat_data') || '{"date":"","count":0}');

      if (stored.date !== d) {
        localStorage.setItem('pawread_chat_data', JSON.stringify({ date: d, count: 1 }));
        return 1;
      }

      const newCount = stored.count + 1;
      localStorage.setItem('pawread_chat_data', JSON.stringify({ date: d, count: newCount }));
      return newCount;
    } catch (e) {
      return 1;
    }
  }

  function toggleChat() {
    chatOpen = !chatOpen;
    document.getElementById('chat-window').classList.toggle('active', chatOpen);

    if (chatOpen) {
      document.getElementById('chat-input').focus();
      updateChatCounter();
    }
  }

  function updateChatCounter() {
    if (isPremium()) return;

    const remaining = MAX_FREE_CHATS - getTodayChatCount();
    const messages = document.getElementById('chat-messages');
    const existing = document.getElementById('chat-limit-info');

    if (existing) existing.remove();

    messages.insertAdjacentHTML(
      'afterbegin',
      `<div id="chat-limit-info" style="text-align:center;font-size:0.75rem;color:var(--soft);padding:0.3rem;background:#FFF8F0;border-radius:8px;">
        ${
          remaining > 0
            ? `✨ Noch <strong>${remaining}</strong> kostenlose Fragen heute`
            : '🔒 Tageslimit erreicht – <a onclick="showGuidePaywall()" style="color:var(--amber);cursor:pointer;text-decoration:underline;">Premium freischalten</a>'
        }
      </div>`
    );
  }

  async function sendChat() {
    const input = document.getElementById('chat-input');
    const messages = document.getElementById('chat-messages');
    const text = input.value.trim();

    if (!text) return;

    if (!isPremium() && getTodayChatCount() >= MAX_FREE_CHATS) {
      showGuidePaywall();
      return;
    }

    if (!isPremium()) incrementChatCount();

    messages.innerHTML += `<div class="chat-msg user">${text}</div>`;
    input.value = '';
    messages.scrollTop = messages.scrollHeight;

    const loadingId = 'loading-' + Date.now();
    messages.innerHTML += `<div class="chat-msg bot loading" id="${loadingId}">tippt...</div>`;
    messages.scrollTop = messages.scrollHeight;

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });

      if (!response.ok) {
        throw new Error(`Chat-Fehler: ${response.status}`);
      }

      const data = await response.json();
      const loadingEl = document.getElementById(loadingId);
      if (loadingEl) loadingEl.remove();

      const answer = data.answer || 'Entschuldigung, ich konnte keine Antwort finden.';
      messages.innerHTML += `<div class="chat-msg bot">${answer}</div>`;
      updateChatCounter();
    } catch (err) {
      const loadingEl = document.getElementById(loadingId);
      if (loadingEl) loadingEl.remove();

      messages.innerHTML += `<div class="chat-msg bot">Entschuldigung, ein Fehler ist aufgetreten. Bitte versuche es erneut.</div>`;
      console.error('Chatfehler:', err);
    }

    messages.scrollTop = messages.scrollHeight;
  }

  function filterGuides(cat, btn) {

  function toggleGuide(id) {
    const element = document.getElementById('guide-' + id);
    if (element) {
      element.classList.toggle('open');
    }
  }

  function renderGuides() {
    const container = document.getElementById('guides-container');
    const filtered = activeFilter === 'alle' ? guides : guides.filter(g => g.cat === activeFilter);
    const freeGuideIds = guides.slice(0, FREE_GUIDES).map(g => g.id);

    container.innerHTML = filtered.map(g => {
      const locked = !isPremium() && !freeGuideIds.includes(g.id);

      return `
        <div class="guide-card ${locked ? 'locked' : ''}" onclick="${locked ? 'showGuidePaywall()' : `toggleGuide(${g.id})`}">
          <div class="guide-card-header">
            <span class="guide-emoji">${locked ? '🔒' : g.emoji}</span>
            <div>
              <h3 style="${locked ? 'color:var(--soft)' : ''}">${g.title}</h3>
              <p>${locked ? 'Nur für Premium-Mitglieder 🐾' : g.preview}</p>
            </div>
            <span class="${locked ? 'lock-badge' : 'guide-tag'}">${locked ? 'Premium' : g.tag}</span>
          </div>
          ${
            !locked
              ? `
                <div class="guide-body" id="guide-${g.id}">
                  <p style="margin-top:0.8rem">${g.content}</p>
                  <div class="guide-signals">
                    ${g.signals.map(s => `<div class="guide-signal"><span>${s.icon}</span><span>${s.text}</span></div>`).join('')}
                  </div>
                </div>
              `
              : `
                <div class="locked-overlay">

                  <button class="unlock-btn" onclick="event.stopPropagation(); showGuidePaywall();">Premium freischalten</button>
                </div>
              `
          }
        </div>
      `;
    }).join('');

      desc: 'Ein Krampfanfall sieht erschreckend aus. Wichtig ist, Verletzungen zu vermeiden und Ruhe zu bewahren.',
      steps: [
        { icon: '🛡️', text: 'Hund vor Verletzungen schuetzen' },
        { icon: '🚫', text: 'Nicht in den Mund greifen' },
        { icon: '🤫', text: 'Ruhe bewahren' },
        { icon: '⏱️', text: 'Dauer des Anfalls messen' },
        { icon: '📞', text: 'Nach dem Anfall Tierarzt kontaktieren' }
      ],
      warn: [
        { icon: '⚠️', text: 'Anfall dauert laenger als 5 Minuten' },
        { icon: '⚠️', text: 'Mehrere Anfaelle hintereinander' },
        { icon: '⚠️', text: 'Hund erholt sich danach nicht' }
      ]
    },
    {
      id: 5, icon: '🩸', iconColor: 'red',
      title: 'Verletzung / Blutung',
      preview: 'Erste Hilfe bei Wunden und Blutungen',
      desc: 'Kleine Wunden kann man erstversorgen. Tiefe oder stark blutende Wunden gehoeren in tieraerztliche Behandlung.',
      steps: [
        { icon: '🤲', text: 'Ruhe ausstrahlen' },
        { icon: '🩹', text: 'Sauberes Tuch aufdruecken und Druck halten' },
        { icon: '🚫', text: 'Kein Desinfektionsmittel fuer Menschen verwenden' },
        { icon: '🔍', text: 'Fremdkoerper nicht selbst entfernen' },
        { icon: '🚗', text: 'Bei starker Blutung oder tiefer Wunde zum Tierarzt' }
      ],
      warn: [
        { icon: '⚠️', text: 'Blutung stoppt trotz Druck nicht' },
        { icon: '⚠️', text: 'Wunde ist tief oder klafft' },
        { icon: '⚠️', text: 'Fremdkoerper steckt in der Wunde' }
      ]
    }
  ];

  function renderNotfaelle() {
    const container = document.getElementById('notfall-grid');

    container.innerHTML = notfaelle.map(n => `
      <div class="notfall-card" onclick="toggleNotfall(${n.id})">
        <div class="notfall-card-header">
          <div class="notfall-icon ${n.iconColor}">${n.icon}</div>
          <div>
            <h3>${n.title}</h3>
            <p>${n.preview}</p>
          </div>
          <span class="notfall-arrow" id="arrow-${n.id}">›</span>
        </div>
        <div class="notfall-detail" id="notfall-${n.id}">
          <p class="notfall-desc">${n.desc}</p>
          <p class="notfall-section-title gruen">✅ Was du tun kannst</p>
          <div class="notfall-steps">
            ${n.steps.map(s => `<div class="notfall-step"><span>${s.icon}</span><span>${s.text}</span></div>`).join('')}
          </div>
          <p class="notfall-section-title rot">🚨 Sofort zum Tierarzt wenn:</p>
          <div class="notfall-steps">
            ${n.warn.map(w => `<div class="notfall-step warn"><span>${w.icon}</span><span>${w.text}</span></div>`).join('')}
          </div>
          <a class="tierarzt-btn" href="https://www.google.com/maps/search/tierarzt+notdienst+in+der+nähe" target="_blank">
            📍 Tierarzt in der Nähe finden
          </a>
        </div>
      </div>
    `).join('');
  }

  function toggleNotfall(id) {
    const detail = document.getElementById('notfall-' + id);
    const arrow = document.getElementById('arrow-' + id);
    if (!detail || !arrow) return;

    const isOpen = detail.classList.contains('open');

    document.querySelectorAll('.notfall-detail').forEach(d => d.classList.remove('open'));
    document.querySelectorAll('.notfall-arrow').forEach(a => {
      a.style.transform = '';
    });

    if (!isOpen) {
      detail.classList.add('open');
      arrow.style.transform = 'rotate(90deg)';
    }
  }

  // ===== ANALYSE =====
  const fileInput = document.getElementById('file-input');
  const previewContainer = document.getElementById('preview-container');
  const previewImg = document.getElementById('preview-img');
  const analyzeBtn = document.getElementById('analyze-btn');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');
  const uploadZone = document.getElementById('upload-zone');
  const changePhotoBtn = document.getElementById('change-photo');

  let currentBase64 = null;
  let currentMimeType = 'image/jpeg';

  function resetState() {
    previewContainer.style.display = 'none';
    analyzeBtn.style.display = 'none';
    uploadZone.style.display = 'block';
    result.style.display = 'none';
    result.innerHTML = '';
    loading.style.display = 'none';
    currentBase64 = null;
    currentMimeType = 'image/jpeg';
    fileInput.value = '';
  }

  function handleFile(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;

    currentMimeType = file.type || 'image/jpeg';

    const reader = new FileReader();
    reader.onload = ev => {
      const fileResult = ev.target?.result;
      if (!fileResult || typeof fileResult !== 'string') return;

      const parts = fileResult.split(',');
      currentBase64 = parts.length > 1 ? parts[1] : null;

      previewImg.src = fileResult;
      previewContainer.style.display = 'block';
      uploadZone.style.display = 'none';
      analyzeBtn.style.display = 'block';
      result.style.display = 'none';
      result.innerHTML = '';
    };

    reader.readAsDataURL(file);
  }

  async function runAnalysis() {
    if (!currentBase64) return;

    if (checkPaywall()) return;

    analyzeBtn.style.display = 'none';
    loading.style.display = 'block';
    result.style.display = 'none';

    try {
      const response = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          imageData: currentBase64,
          mimeType: currentMimeType
        })
      });

      if (!response.ok) {
        throw new Error(`Serverfehler: ${response.status}`);
      }

      const parsed = await response.json();
      const signals = Array.isArray(parsed.signals) ? parsed.signals : [];

      loading.style.display = 'none';

      if (parsed.error && !parsed.mood) {
        result.innerHTML = `
          <div class="result-card">
            <span class="mood-emoji">⚠️</span>
            <h3>Fehler</h3>
            <p class="summary">${parsed.error}</p>
          </div>
          <button class="retry-btn" onclick="resetState()">↩ Erneut versuchen</button>
        `;
      } else if (parsed.error) {
        result.innerHTML = `
          <div class="result-card">
            <span class="mood-emoji">🤔</span>
            <h3>Kein Hund erkannt</h3>
            <p class="summary">Bitte lade ein Foto hoch, auf dem ein Hund klar zu sehen ist.</p>
          </div>
          <button class="retry-btn" onclick="resetState()">↩ Anderes Foto</button>
        `;
      } else {
        const ampelClass = parsed.ampel ? 'ampel-' + parsed.ampel.toLowerCase() : 'ampel-gruen';
        const ampelEmoji =
          parsed.ampel === 'GRUEN' ? '🟢' :
          parsed.ampel === 'GELB' ? '🟡' :
          parsed.ampel === 'ORANGE' ? '🟠' :
          parsed.ampel === 'ROT' ? '🔴' : '🟢';

        result.innerHTML = `
          <div class="mood-badge">🐶 Stimmungsanalyse</div>
          <div class="result-card">
            <span class="mood-emoji">${parsed.emoji || '🐶'}</span>
            <h3>${parsed.mood || 'Analyse'}</h3>
            ${parsed.ampel ? `
              <div class="ampel-box ${ampelClass}">
                <div class="ampel-dot"></div>
                <div class="ampel-text">
                  <div class="ampel-label">${ampelEmoji} ${parsed.ampel}</div>
                  ${parsed.ampelText || ''}
                </div>
              </div>
            ` : ''}
            <p class="summary">${parsed.summary || 'Keine Zusammenfassung verfügbar.'}</p>
            <p class="signals-title">Körpersignale</p>
            <div class="signals">
              ${signals.map(s => `
                <div class="signal">
                  <span class="signal-icon">${s.icon || '🐾'}</span>
                  <span>${s.text || ''}</span>
                </div>
              `).join('')}
            </div>
            <div class="tip-box">
              <p class="tip-label">💡 Dein Tipp</p>
              <p>${parsed.tip || 'Bitte beobachte deinen Hund weiter im Gesamtkontext.'}</p>
            </div>
            ${parsed.disclaimer ? `
              <p style="font-size:0.75rem;color:#A0856A;text-align:center;margin-top:1rem;line-height:1.5;font-style:italic;">
                ℹ️ ${parsed.disclaimer}
              </p>
            ` : ''}
          </div>
          <button class="retry-btn" onclick="resetState()">📸 Neues Foto analysieren</button>
        `;

        incrementAnalysisCount();
      }

      result.style.display = 'block';
    } catch (err) {
      console.error('Analysefehler:', err);
      loading.style.display = 'none';
      result.innerHTML = `
        <div class="result-card">
          <span class="mood-emoji">⚠️</span>
          <h3>Fehler bei der Analyse</h3>
          <p class="summary">${err.message || 'Bitte erneut versuchen.'}</p>
        </div>
        <button class="retry-btn" onclick="resetState()">↩ Erneut versuchen</button>
      `;
      result.style.display = 'block';
      analyzeBtn.style.display = 'block';
    }
  }

  // ===== EVENTS =====
  fileInput.addEventListener('change', handleFile);
  changePhotoBtn.addEventListener('click', () => {
    resetState();
    fileInput.click();
  });
  analyzeBtn.addEventListener('click', runAnalysis);

  // ===== INIT =====
  renderGuides();
  renderNotfaelle();
</script>
